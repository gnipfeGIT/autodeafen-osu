name: Build release exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish single exe
        shell: pwsh
        run: .\publish-release.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoDeafenOsu-win-x64
          path: dist/AutoDeafenOsu.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME dist/AutoDeafenOsu.exe --generate-notes
